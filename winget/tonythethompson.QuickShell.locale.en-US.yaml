ReleaseNotes: |
  - Fix root palette search so home keywords surface shortcuts as a list instead of running like a command
  - Home keyword field label and help text on the shortcut form (JSON field remains Abbreviation)
  - run-cmdpal-dev.ps1 script for local CmdPal + Quick Shell dev loop
  - Debug build and dev MSIX deploy signing fixes
