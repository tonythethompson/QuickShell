ShortDescription: Open saved terminal directories and run commands from PowerToys Command Palette
Description: |
  Quick Shell is a PowerToys Command Palette extension that lets you save
  favorite project directories and launch them in Windows Terminal, PowerShell,
  PowerShell 7, or cmd — optionally running a command on open.

  After installing, open PowerToys Command Palette and run "Reload Command Palette Extension".
  For full Command Palette integration, MSIX install via scripts/deploy.ps1 is recommended.
Tags:
- command-palette
- commandline
- powershell
- quickshell
- terminal
- windows-commandpalette-extension
- windows-terminal
ReleaseNotes: |
  - Import and export shortcuts as JSON
  - Always run as administrator toggle on the shortcut form, with one-off elevated or standard open from the context menu
  - Favorite shortcuts (star badge) instead of pin-to-top, to avoid clashing with Command Palette pin-to-home
  - Edit drafts autosave with list recovery for unsaved form changes
  - Stable shortcut IDs so home-pinned shortcuts survive renames
  - Shortcut list hover actions for create, edit, favorite, and more (requires local CmdPal SDK build via deploy.ps1)
  - Form fixes: browse folder and cancel work with an empty path; leaving the form returns to the list without closing Command Palette
  - Admin and favorite glyph badges on shortcut rows
ReleaseNotesUrl: https://github.com/tonythethompson/QuickShell/releases/tag/v0.1.3.0
