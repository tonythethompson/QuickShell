ReleaseNotes: |
  - Home keywords: fix root palette search and clearer form label/help text
  - Any terminal you use: Windows Terminal profiles (custom shells included), WSL, and classic shells
  - Privacy policy added; removed unused internetClient capability
  - Store MSIX builds unsigned for Microsoft re-signing after certification
  - Updated Store screenshots and listing copy
