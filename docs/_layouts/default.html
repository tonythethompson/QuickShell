<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1218">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect fill=%220078d6%22 width=%2216%22 height=%2216%22 rx=%222%22/><path fill=%22white%22 d=%22M8 2c.5 0 1 .2 1.4.6l4 4c.4.4.6.9.6 1.4v6c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h4zm0 2H4v8h8V8.5L8 4z%22/></svg>" type="image/svg+xml">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          {% for item in site.header_pages %}
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
          {% endfor %}
          <a href="https://github.com/{{ site.repository }}" title="View on GitHub">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="site-main wrap">
      {{ content }}
    </main>

    <!-- Lightbox -->
    <div id="lightbox-overlay" class="lightbox-overlay" role="dialog" aria-modal="true" aria-label="Screenshot viewer">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
      <img id="lightbox-img" src="" alt="">
      <p class="lightbox-caption" id="lightbox-caption"></p>
      <span class="lightbox-hint">Esc or click outside to close</span>
    </div>

    <script>
    (function () {
      var overlay = document.getElementById('lightbox-overlay');
      var lbImg = document.getElementById('lightbox-img');
      var caption = document.getElementById('lightbox-caption');
      var closeBtn = document.getElementById('lightbox-close');

      function openLightbox(src, alt) {
        lbImg.src = src;
        lbImg.alt = alt || '';
        caption.textContent = alt || '';
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(function () { lbImg.src = ''; }, 300);
      }

      document.querySelectorAll('.screenshot-grid img').forEach(function (el) {
        el.style.cursor = 'zoom-in';
        el.setAttribute('role', 'button');
        el.setAttribute('tabindex', '0');
        el.addEventListener('click', function () { openLightbox(el.src, el.alt); });
        el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(el.src, el.alt); }
        });
      });

      closeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        closeLightbox();
      });

      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeLightbox();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) closeLightbox();
      });
    })();
    </script>

    <footer class="site-footer">
      <div class="wrap">
        <div>
          <p>
            <strong>{{ site.title }}</strong><br>
            <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a> ·
            <a href="https://github.com/{{ site.repository }}/issues">Issues</a> ·
            <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
          </p>
        </div>
        <div>
          <p class="muted">
            MIT License<br>
            Not affiliated with Microsoft or PowerToys
          </p>
        </div>
        <div>
          <p class="muted">
            Built by <a href="https://trackdub.com">trackdub.com</a><br>
            <a href="https://github.com/{{ site.repository }}">View on GitHub</a>
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
